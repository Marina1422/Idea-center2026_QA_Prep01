
name: IdeaCenter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore ExamPrepIdeaCenter/ExamPrepIdeaCenter.csproj
    - name: Build
      run: dotnet build ExamPrepIdeaCenter/ExamPrepIdeaCenter.csproj --configuration Release
      run: dotnet test --no-build --verbosity normal

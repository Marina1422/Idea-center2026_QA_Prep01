
name: IdeaCenter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore "test GitHub 2/Idea-center2026_QA_Prep01/ExamPrepIdeaCenter.csproj"
    - name: Build
      run: dotnet build "test GitHub 2/Idea-center2026_QA_Prep01/ExamPrepIdeaCenter.csproj" --configuration Release
    - name: Test
      run: dotnet test "test GitHub 2/Idea-center2026_QA_Prep01/ExamPrepIdeaCenter.csproj" --no-build --verbosity normal
